# Coolify / production: only `docs-mcp` runs by default (one public URL).
# Local dev with hot reload: docker compose --profile dev up
services:
  # Production: static Docusaurus + MCP (/mcp) — this should be the only public service in Coolify.
  docs-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frikamf-docs-mcp
    ports:
      - "3040:3000"

  # Dev-only: Docusaurus `npm run start` — sibling repo ../gregWiki (NOT ./wiki; that path does not exist here).
  docs:
    profiles:
      - dev
    build:
      context: ../gregWiki
      dockerfile: Dockerfile
    container_name: frikamf-docs
    working_dir: /app
    command: npm run start -- --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ../gregWiki:/app
      - /app/node_modules

  # Dev-only: one-off `npm run build`
  docs-build:
    profiles:
      - dev
    build:
      context: ../gregWiki
      dockerfile: Dockerfile
    container_name: frikamf-docs-build
    working_dir: /app
    command: npm run build
    volumes:
      - ../gregWiki:/app
      - /app/node_modules
