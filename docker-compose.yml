# Coolify / production: only `docs-mcp` runs by default (one public URL).
# Local dev with hot reload: docker compose --profile dev up
services:
  # Production: static Docusaurus + MCP (/mcp) — this should be the only public service in Coolify.
  docs-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frikamf-docs-mcp
    ports:
      - "3040:3000"

  # Dev-only: Docusaurus `npm run start` (second HTTP service → duplicate Coolify URLs if left on default profile)
  docs:
    profiles:
      - dev
    build:
      context: .
      dockerfile: wiki/Dockerfile
    container_name: frikamf-docs
    working_dir: /app
    command: npm run start -- --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./wiki:/app
      - ./docs:/docs
      # When the repo root is mounted at /app, the site may run from /app/wiki; ../docs → /app/docs.
      - ./docs:/app/docs
      - /app/node_modules

  # Dev-only: one-off `npm run build` (use locally; not for Coolify routing)
  docs-build:
    profiles:
      - dev
    build:
      context: .
      dockerfile: wiki/Dockerfile
    container_name: frikamf-docs-build
    working_dir: /app
    command: npm run build
    volumes:
      - ./wiki:/app
      - ./docs:/docs
      - ./docs:/app/docs
      - /app/node_modules
