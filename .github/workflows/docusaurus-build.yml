name: Docusaurus build

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "wiki/**"
      - "Dockerfile"
      - "docker-compose.yml"
  pull_request:
    branches: [master]
    paths:
      - "docs/**"
      - "wiki/**"
      - "Dockerfile"
      - "docker-compose.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: wiki

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wiki/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
